kind = "web"
previewPath = "/"
title = "Fighter Jet 2D"
version = "1.0.0"
id = "artifacts/flight-sim"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22439

[services.development]
run = "pnpm --filter @workspace/flight-sim run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flight-sim", "run", "build" ]
publicDir = "artifacts/flight-sim/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22439"
BASE_PATH = "/"
